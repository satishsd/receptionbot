<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReceptionBot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 700px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      background: #4f46e5;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chat-header .avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    #chat-header .info h2 { font-size: 16px; font-weight: 600; }
    #chat-header .info p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      margin-right: 4px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.bot {
      background: #f3f4f6;
      color: #111827;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #4f46e5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.system {
      background: #fef3c7;
      color: #92400e;
      align-self: center;
      font-size: 12px;
      border-radius: 8px;
      text-align: center;
    }

    #typing-indicator {
      display: none;
      align-self: flex-start;
      background: #f3f4f6;
      padding: 10px 16px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    #typing-indicator span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    #typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    #typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      background: #fff;
    }

    #user-input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: #4f46e5; }
    #user-input:disabled { background: #f9fafb; }

    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send-btn:hover:not(:disabled) { background: #4338ca; }
    #send-btn:disabled { background: #c7d2fe; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <div class="avatar">🤖</div>
      <div class="info">
        <h2>ReceptionBot</h2>
        <p><span id="status-dot"></span><span id="status-text">Connecting…</span></p>
      </div>
    </div>

    <div id="messages">
      <!-- messages injected here -->
    </div>

    <div id="typing-indicator">
      <span></span><span></span><span></span>
    </div>

    <div id="input-area">
      <input
        id="user-input"
        type="text"
        placeholder="Type a message…"
        autocomplete="off"
        disabled
      />
      <button id="send-btn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const typingEl   = document.getElementById('typing-indicator');
    const statusText = document.getElementById('status-text');
    const statusDot  = document.getElementById('status-dot');

    let sessionId = null;

    // --- helpers ---

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(online) {
      statusDot.style.background = online ? '#4ade80' : '#f87171';
      statusText.textContent     = online ? 'Online' : 'Offline';
    }

    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled;
      if (enabled) inputEl.focus();
    }

    function showTyping(show) {
      typingEl.style.display = show ? 'flex' : 'none';
      if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // --- API calls ---

    async function createSession() {
      const res = await fetch('/api/chat/session', { method: 'POST' });
      if (!res.ok) throw new Error('Failed to create session');
      const data = await res.json();
      return data.sessionId;
    }

    async function sendMessage(text) {
      const res = await fetch('/api/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text }),
      });
      if (!res.ok) throw new Error('Failed to send message');
      return res.json();
    }

    // --- main flow ---

    async function init() {
      try {
        sessionId = await createSession();
        setStatus(true);
        setInputEnabled(true);
        addMessage('👋 Hi! I\'m ReceptionBot. How can I help you today?\n\nYou can ask me about:\n• Business hours\n• Our services\n• Book an appointment', 'bot');
      } catch (err) {
        addMessage('⚠️ Could not connect to the server. Please refresh and try again.', 'system');
        setStatus(false);
      }
    }

    async function handleSend() {
      const text = inputEl.value.trim();
      if (!text || !sessionId) return;

      inputEl.value = '';
      addMessage(text, 'user');
      setInputEnabled(false);
      showTyping(true);

      try {
        const data = await sendMessage(text);
        showTyping(false);
        addMessage(data.message.text, 'bot');
      } catch (err) {
        showTyping(false);
        addMessage('⚠️ Something went wrong. Please try again.', 'system');
      } finally {
        setInputEnabled(true);
      }
    }

    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    init();
  </script>
</body>
</html>
